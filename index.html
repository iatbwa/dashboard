<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CEO Dashboard — PlannerOS</title>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #1a1a2e;
      --sb: #16213e;
      --card: #1e2a4a;
      --card2: #253556;
      --ac: #6c63ff;
      --ac2: #ff6584;
      --ac3: #43e97b;
      --ac4: #f7971e;
      --t: #e8eaf6;
      --t2: #8892b0;
      --t3: #ccd6f6;
      --br: #2d3561;
    }

    html, body {
      height: 100%;
      font-family: 'Figtree', sans-serif;
      background: var(--bg);
      color: var(--t);
      font-size: 14px;
      overflow: hidden;
    }

    .lay { display: flex; height: 100vh; }
    .sb {
      width: 230px;
      flex-shrink: 0;
      background: var(--sb);
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--br);
    }

    .sb-logo {
      padding: 18px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid var(--br);
    }

    .sb-mark {
      width: 34px;
      height: 34px;
      border-radius: 9px;
      background: linear-gradient(135deg, var(--ac), var(--ac2));
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 15px;
      color: #fff;
      flex-shrink: 0;
    }

    .sb-txt {
      font-weight: 700;
      font-size: 16px;
      color: var(--t3);
      line-height: 1.2;
    }

    .sb-txt span {
      color: var(--ac);
      font-size: 10px;
      font-weight: 500;
      display: block;
      letter-spacing: .5px;
    }

    .sb-sec {
      padding: 14px 12px 4px;
      font-size: 10px;
      font-weight: 700;
      color: var(--t2);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .sb-item {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 8px 12px;
      border-radius: 8px;
      margin: 2px 8px;
      cursor: pointer;
      color: var(--t2);
      font-size: 13px;
      font-weight: 500;
      transition: all .15s;
    }

    .sb-item:hover {
      background: rgba(108, 99, 255, .12);
      color: var(--t3);
    }

    .sb-item.on {
      background: rgba(108, 99, 255, .2);
      color: var(--ac);
    }

    .sb-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .sb-bot {
      margin-top: auto;
      padding: 12px;
      border-top: 1px solid var(--br);
    }

    .sb-user {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px;
      border-radius: 8px;
    }

    .sb-av {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--ac), var(--ac2));
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 11px;
      color: #fff;
      flex-shrink: 0;
    }

    .ms-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 12px;
      background: rgba(108, 99, 255, .15);
      border: 1px solid rgba(108, 99, 255, .3);
      border-radius: 8px;
      margin: 8px;
      cursor: pointer;
      color: var(--ac);
      font-size: 12px;
      font-weight: 600;
      width: calc(100% - 16px);
      font-family: inherit;
      transition: all .15s;
    }

    .ms-btn:hover { background: rgba(108, 99, 255, .28); }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .topbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 24px;
      border-bottom: 1px solid var(--br);
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    .ttl { font-size: 17px; font-weight: 700; color: var(--t3); }
    .tsub { font-size: 12px; color: var(--t2); }

    .srch {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--card);
      border: 1px solid var(--br);
      border-radius: 8px;
      padding: 7px 12px;
      margin-left: auto;
      min-width: 160px;
    }

    .srch input {
      background: none;
      border: none;
      outline: none;
      color: var(--t3);
      font-size: 13px;
      font-family: inherit;
      width: 100%;
    }

    .srch input::placeholder { color: var(--t2); }

    .sel {
      background: var(--card);
      border: 1px solid var(--br);
      border-radius: 8px;
      padding: 7px 10px;
      color: var(--t2);
      font-size: 12px;
      font-family: inherit;
      outline: none;
      cursor: pointer;
    }

    .sel option { background: var(--sb); }

    .tbtn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border-radius: 8px;
      border: 1px solid var(--br);
      background: transparent;
      color: var(--t2);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      transition: all .15s;
      white-space: nowrap;
    }

    .tbtn:hover {
      border-color: var(--ac);
      color: var(--ac);
    }

    .tbtn.pri {
      background: var(--ac);
      border-color: var(--ac);
      color: #fff;
    }

    .tbtn.pri:hover { background: #7b74ff; }

    .vtog {
      display: flex;
      background: var(--card);
      border: 1px solid var(--br);
      border-radius: 8px;
      overflow: hidden;
    }

    .vb {
      padding: 7px 12px;
      border: none;
      background: transparent;
      color: var(--t2);
      font-size: 12px;
      cursor: pointer;
      font-family: inherit;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: all .15s;
    }

    .vb.on {
      background: rgba(108, 99, 255, .2);
      color: var(--ac);
    }

    .spill {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--t2);
      padding: 5px 12px;
      background: var(--card);
      border: 1px solid var(--br);
      border-radius: 20px;
      white-space: nowrap;
    }

    .dp {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      animation: pulse 2s infinite;
      flex-shrink: 0;
    }

    @keyframes pulse {
      0%,100% { opacity: 1; }
      50% { opacity: .3; }
    }

    .content {
      flex: 1;
      overflow-y: auto;
      padding: 22px 24px;
    }

    .content::-webkit-scrollbar { width: 5px; }
    .content::-webkit-scrollbar-thumb {
      background: var(--br);
      border-radius: 3px;
    }

    .kgrid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
      margin-bottom: 22px;
    }

    .kcard {
      background: var(--card);
      border: 1px solid var(--br);
      border-radius: 14px;
      padding: 18px;
      cursor: pointer;
      transition: all .2s;
      position: relative;
      overflow: hidden;
    }

    .kcard::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
    }

    .kcard.cp::before { background: var(--ac); }
    .kcard.cg::before { background: var(--ac3); }
    .kcard.cy::before { background: var(--ac4); }
    .kcard.cr::before { background: var(--ac2); }

    .kcard:hover {
      border-color: rgba(108, 99, 255, .4);
      transform: translateY(-2px);
    }

    .kcard.on {
      border-color: var(--ac);
      background: var(--card2);
    }

    .klb {
      font-size: 11px;
      font-weight: 700;
      color: var(--t2);
      text-transform: uppercase;
      letter-spacing: .7px;
      margin-bottom: 10px;
    }

    .kv {
      font-size: 30px;
      font-weight: 700;
      line-height: 1;
      margin-bottom: 6px;
    }

    .kcard.cp .kv { color: var(--ac); }
    .kcard.cg .kv { color: var(--ac3); }
    .kcard.cy .kv { color: var(--ac4); }
    .kcard.cr .kv { color: var(--ac2); }

    .ksub { font-size: 11px; color: var(--t2); }

    .kbar {
      height: 4px;
      background: rgba(255, 255, 255, .07);
      border-radius: 2px;
      margin-top: 12px;
      overflow: hidden;
    }

    .kfill {
      height: 100%;
      border-radius: 2px;
      transition: width .6s;
    }

    .twrap {
      background: var(--card);
      border: 1px solid var(--br);
      border-radius: 14px;
      overflow: hidden;
      margin-bottom: 2rem;
    }

    .thead,
    .tr {
      display: grid;
      grid-template-columns: 2.2fr 1fr 1.2fr 1fr 100px 100px 130px 120px 44px;
      align-items: center;
      gap: 10px;
      padding: 11px 18px;
    }

    .thead {
      background: rgba(255, 255, 255, .03);
      border-bottom: 1px solid var(--br);
    }

    .th {
      font-size: 10px;
      font-weight: 700;
      color: var(--t2);
      text-transform: uppercase;
      letter-spacing: .7px;
      white-space: nowrap;
    }

    .tr {
      padding: 12px 18px;
      border-bottom: 1px solid rgba(255, 255, 255, .04);
      cursor: pointer;
      transition: background .12s;
      animation: fi .3s ease both;
    }

    .tr:hover { background: rgba(255, 255, 255, .03); }
    .tr:last-child { border-bottom: none; }

    @keyframes fi {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: none; }
    }

    .rn {
      font-size: 13px;
      font-weight: 500;
      color: var(--t3);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .mpill {
      display: inline-flex;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      white-space: nowrap;
    }

    .dc {
      font-size: 11px;
      color: var(--t2);
      white-space: nowrap;
    }

    .avs { display: flex; }

    .av {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 8px;
      font-weight: 700;
      border: 2px solid var(--card);
      margin-left: -6px;
      flex-shrink: 0;
    }

    .av:first-child { margin-left: 0; }

    .pc {
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .pb {
      height: 4px;
      flex: 1;
      background: rgba(255, 255, 255, .08);
      border-radius: 2px;
      overflow: hidden;
    }

    .pf {
      height: 100%;
      border-radius: 2px;
    }

    .pt {
      font-size: 11px;
      font-weight: 700;
      min-width: 30px;
      text-align: right;
    }

    .sema {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      white-space: nowrap;
    }

    .mb {
      width: 26px;
      height: 26px;
      border-radius: 7px;
      border: 1px solid var(--br);
      background: transparent;
      color: var(--t2);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      transition: all .12s;
    }

    .mb:hover {
      background: rgba(108, 99, 255, .15);
      color: var(--ac);
      border-color: var(--ac);
    }

    .glb {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 18px;
      font-size: 11px;
      font-weight: 700;
      color: var(--t2);
      text-transform: uppercase;
      letter-spacing: .5px;
      background: rgba(255, 255, 255, .02);
      border-bottom: 1px solid rgba(255, 255, 255, .04);
    }

    .gdot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .kan {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
      margin-bottom: 2rem;
    }

    .kcol {
      background: var(--card);
      border: 1px solid var(--br);
      border-radius: 14px;
      padding: 14px;
      min-height: 320px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .khdr {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2px;
    }

    .ktit {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 700;
      color: var(--t2);
      text-transform: uppercase;
      letter-spacing: .6px;
    }

    .kbadge {
      background: rgba(255, 255, 255, .08);
      color: var(--t2);
      border-radius: 20px;
      padding: 2px 8px;
      font-size: 10px;
      font-weight: 700;
    }

    .kcard2 {
      background: var(--card2);
      border: 1px solid var(--br);
      border-radius: 10px;
      padding: 13px;
      cursor: pointer;
      transition: all .15s;
      animation: fi .3s ease both;
    }

    .kcard2:hover {
      border-color: rgba(108, 99, 255, .4);
      transform: translateY(-1px);
    }

    .kname {
      font-size: 13px;
      font-weight: 600;
      color: var(--t3);
      margin-bottom: 9px;
      line-height: 1.35;
    }

    .kmeta {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 9px;
      flex-wrap: wrap;
    }

    .kft {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 9px;
    }

    .kdate { font-size: 10px; color: var(--t2); }

    .ov {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .72);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      animation: fi .2s;
    }

    .mod {
      background: var(--sb);
      border: 1px solid var(--br);
      border-radius: 14px;
      width: 560px;
      max-width: 95vw;
      max-height: 88vh;
      overflow-y: auto;
      box-shadow: 0 30px 90px rgba(0, 0, 0, .7);
      animation: su .22s;
    }

    @keyframes su {
      from { opacity: 0; transform: translateY(14px); }
      to { opacity: 1; transform: none; }
    }

    .mtop { padding: 22px 26px 18px; border-bottom: 1px solid var(--br); }
    .mbody { padding: 22px 26px; }
    .ms { margin-bottom: 20px; }

    .mlb {
      font-size: 10px;
      font-weight: 700;
      color: var(--t2);
      text-transform: uppercase;
      letter-spacing: .8px;
      margin-bottom: 10px;
    }

    .mgrid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .mf {
      background: var(--card);
      border: 1px solid var(--br);
      border-radius: 9px;
      padding: 11px 14px;
    }

    .mfl { font-size: 10px; color: var(--t2); margin-bottom: 4px; }
    .mfv { font-size: 13px; font-weight: 600; color: var(--t3); }

    .mavs {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }

    .mavchip {
      display: flex;
      align-items: center;
      gap: 7px;
      background: var(--card);
      border: 1px solid var(--br);
      border-radius: 20px;
      padding: 5px 12px 5px 5px;
    }

    .mavdot {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      font-weight: 700;
      flex-shrink: 0;
    }

    .mnotes {
      background: var(--card);
      border: 1px solid var(--br);
      border-radius: 9px;
      padding: 14px;
      font-size: 13px;
      color: var(--t2);
      line-height: 1.7;
      min-height: 70px;
    }

    .mfoot {
      padding: 14px 26px;
      border-top: 1px solid var(--br);
      display: flex;
      justify-content: flex-end;
    }

    .cx {
      width: 30px;
      height: 30px;
      border-radius: 7px;
      border: 1px solid var(--br);
      background: transparent;
      color: var(--t2);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .cx:hover {
      background: rgba(255, 255, 255, .08);
      color: var(--t3);
    }

    .empty {
      text-align: center;
      padding: 3rem;
      color: var(--t2);
    }

    @media (max-width: 1200px) {
      .kgrid, .kan { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

    @media (max-width: 900px) {
      .sb { display: none; }
      .kgrid, .kan { grid-template-columns: 1fr; }
      .thead, .tr { grid-template-columns: 2fr 1fr 1fr 1fr; }
      .thead .th:nth-child(n+5),
      .tr > div:nth-child(n+5) { display: none; }
    }
  </style>
</head>
<body>
  <div class="lay">
    <div class="sb">
      <div class="sb-logo">
        <div class="sb-mark">P</div>
        <div class="sb-txt">PlannerOS <span>CEO DASHBOARD</span></div>
      </div>

      <div class="sb-sec">Vistas</div>

      <div class="sb-item on" onclick="nav(this, 'all')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="7"></rect>
          <rect x="14" y="3" width="7" height="7"></rect>
          <rect x="3" y="14" width="7" height="7"></rect>
          <rect x="14" y="14" width="7" height="7"></rect>
        </svg>
        Todos los proyectos
      </div>

      <div class="sb-item" onclick="nav(this, 'activos')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
        </svg>
        En progreso
      </div>

      <div class="sb-item" onclick="nav(this, 'riesgo')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"></path>
          <line x1="12" y1="9" x2="12" y2="13"></line>
          <line x1="12" y1="17" x2="12.01" y2="17"></line>
        </svg>
        En riesgo
      </div>

      <div class="sb-item" onclick="nav(this, 'completados')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="20 6 9 17 4 12"></polyline>
        </svg>
        Completados
      </div>

      <div class="sb-sec" style="margin-top:8px">Marcas</div>
      <div id="sbm"></div>

      <div style="padding:8px">
        <button class="ms-btn" id="ms-btn" onclick="login()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
            <rect x="1" y="1" width="10" height="10" fill="#f25022" rx="1"></rect>
            <rect x="13" y="1" width="10" height="10" fill="#7fba00" rx="1"></rect>
            <rect x="1" y="13" width="10" height="10" fill="#00a4ef" rx="1"></rect>
            <rect x="13" y="13" width="10" height="10" fill="#ffb900" rx="1"></rect>
          </svg>
          Conectar Planner
        </button>
      </div>

      <div class="sb-bot">
        <div class="sb-user">
          <div class="sb-av">CEO</div>
          <div>
            <div style="font-size:12px;font-weight:600;color:var(--t3)">Mi Empresa</div>
            <div style="font-size:10px;color:var(--t2)">Administrador</div>
          </div>
        </div>
      </div>
    </div>

    <div class="main">
      <div class="topbar">
        <div style="display:flex;align-items:baseline;gap:6px">
          <span class="ttl">Proyectos</span>
          <span class="tsub" id="sub">...</span>
        </div>

        <div class="spill" id="spill">
          <div class="dp" style="background:var(--ac3)"></div>
          Iniciando...
        </div>

        <div class="srch">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
          <input type="text" id="srch" placeholder="Buscar..." oninput="render()" />
        </div>

        <select class="sel" id="fm" onchange="render()">
          <option value="">Todas las marcas</option>
        </select>

        <select class="sel" id="fs" onchange="render()">
          <option value="">Todos los estados</option>
          <option value="verde">En tiempo</option>
          <option value="amarillo">En riesgo</option>
          <option value="rojo">Retrasado</option>
          <option value="gris">Sin iniciar</option>
        </select>

        <div class="vtog">
          <button class="vb on" id="bt" onclick="sw('t')">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <line x1="3" y1="6" x2="21" y2="6"></line>
              <line x1="3" y1="12" x2="21" y2="12"></line>
              <line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
            Tabla
          </button>
          <button class="vb" id="bk" onclick="sw('k')">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <rect x="3" y="3" width="5" height="18"></rect>
              <rect x="10" y="3" width="5" height="18"></rect>
              <rect x="17" y="3" width="4" height="18"></rect>
            </svg>
            Kanban
          </button>
        </div>

        <button class="tbtn pri" onclick="sync()">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <polyline points="23 4 23 10 17 10"></polyline>
            <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
          </svg>
          Sincronizar
        </button>
      </div>

      <div class="content">
        <div class="kgrid" id="kg"></div>
        <div id="vt"></div>
        <div id="vk" style="display:none"></div>
      </div>
    </div>
  </div>

  <div id="mr"></div>

  <script>
    const CID = 'c153ba18-d194-49da-b0d7-55e1439a2bc6';
    const TID = 'ff21ad01-093b-459d-80c8-0faa85709900';
    const SC = 'Tasks.Read Group.Read.All User.Read';

    const RD = location.origin + location.pathname.replace(/\/$/, '');

    let tok = null;
    let prj = [];
    let view = 't';
    let kpi = null;

    const ST = {
      verde: { l: 'En tiempo', bg: 'rgba(67,233,123,.15)', c: '#43e97b', d: '#43e97b' },
      amarillo: { l: 'En riesgo', bg: 'rgba(247,151,30,.15)', c: '#f7971e', d: '#f7971e' },
      rojo: { l: 'Retrasado', bg: 'rgba(255,101,132,.15)', c: '#ff6584', d: '#ff6584' },
      gris: { l: 'Sin iniciar', bg: 'rgba(136,146,176,.1)', c: '#8892b0', d: '#8892b0' }
    };

    const MC = ['#6c63ff', '#ff6584', '#43e97b', '#f7971e', '#00d2ff', '#c239b3', '#38b2ac'];
    const AC = ['#6c63ff', '#ff6584', '#43e97b', '#f7971e', '#00d2ff', '#c239b3'];

    const SP = [
      { id: 1, nombre: 'Campaña verano 2025', marca: 'Marca A', tipo: 'Marketing', inicio: '2025-05-01', entrega: '2025-07-31', avance: 65, estado: 'verde', involucrados: ['Ana Ruiz', 'Luis Mora', 'Sara Pérez'], notas: 'Aprobada por dirección. Assets en producción.' },
      { id: 2, nombre: 'Rediseño web corporativo', marca: 'Marca B', tipo: 'Digital', inicio: '2025-03-15', entrega: '2025-06-30', avance: 40, estado: 'amarillo', involucrados: ['Carlos Vidal', 'Mía López'], notas: 'Retrasos en entrega de contenidos.' },
      { id: 3, nombre: 'Lanzamiento producto X', marca: 'Marca A', tipo: 'Producto', inicio: '2025-01-10', entrega: '2025-04-30', avance: 90, estado: 'verde', involucrados: ['José Alva', 'Ana Ruiz', 'Diego Flores', 'Valeria T.'], notas: 'En recta final. Evento confirmado.' },
      { id: 4, nombre: 'Plan medios Q3', marca: 'Marca C', tipo: 'Medios', inicio: '2025-06-01', entrega: '2025-09-30', avance: 10, estado: 'gris', involucrados: ['Laura Soto'], notas: 'Pendiente aprobación de presupuesto.' },
      { id: 5, nombre: 'Activación retail', marca: 'Marca B', tipo: 'Trade', inicio: '2025-04-01', entrega: '2025-05-15', avance: 20, estado: 'rojo', involucrados: ['Pedro Núñez', 'María Castro'], notas: 'Material POP retrasado.' },
      { id: 6, nombre: 'Campaña redes sociales', marca: 'Marca D', tipo: 'Digital', inicio: '2025-02-01', entrega: '2025-03-31', avance: 100, estado: 'verde', involucrados: ['Sofía Ramos', 'Tomás K.'], notas: 'Completado. KPIs superados en 120%.' },
      { id: 7, nombre: 'Estrategia marca 2026', marca: 'Marca C', tipo: 'Estrategia', inicio: '2025-05-15', entrega: '2025-08-01', avance: 30, estado: 'amarillo', involucrados: ['Ana Ruiz', 'Luis Mora', 'Pedro Núñez', 'Laura Soto'], notas: 'Workshop pendiente.' },
      { id: 8, nombre: 'Video institucional', marca: 'Marca A', tipo: 'Producción', inicio: '2025-04-10', entrega: '2025-05-20', avance: 55, estado: 'verde', involucrados: ['Diego Flores'], notas: 'En post-producción.' }
    ];

    function mc(m) {
      const ms = [...new Set(prj.length ? prj.map(p => p.marca) : SP.map(p => p.marca))];
      const idx = ms.indexOf(m);
      return MC[(idx >= 0 ? idx : 0) % MC.length];
    }

    function ini(n) {
      return n.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
    }

    function b64(b) {
      return btoa(String.fromCharCode(...new Uint8Array(b)))
        .replace(/\+/g, '-')
        .replace(/\//g, '_')
        .replace(/=/g, '');
    }

    function gv() {
      const a = new Uint8Array(32);
      crypto.getRandomValues(a);
      return b64(a);
    }

    async function gc(v) {
      const digest = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(v));
      return b64(digest);
    }

    async function login() {
      const v = gv();
      const c = await gc(v);
      sessionStorage.setItem('pv', v);

      location.href =
        `https://login.microsoftonline.com/${TID}/oauth2/v2.0/authorize` +
        `?client_id=${CID}` +
        `&response_type=code` +
        `&redirect_uri=${encodeURIComponent(RD)}` +
        `&scope=${encodeURIComponent(SC)}` +
        `&code_challenge=${c}` +
        `&code_challenge_method=S256` +
        `&response_mode=query`;
    }

    async function xcode(code) {
      const v = sessionStorage.getItem('pv');
      sessionStorage.removeItem('pv');

      const r = await fetch(`https://login.microsoftonline.com/${TID}/oauth2/v2.0/token`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: new URLSearchParams({
          client_id: CID,
          grant_type: 'authorization_code',
          code,
          redirect_uri: RD,
          code_verifier: v,
          scope: SC
        })
      });

      const d = await r.json();
      return d.access_token || null;
    }

    function ss(t, c) {
      document.getElementById('spill').innerHTML = `<div class="dp" style="background:${c}"></div>${t}`;
    }

    function pf() {
      const ms = [...new Set(prj.map(p => p.marca))];

      document.getElementById('fm').innerHTML =
        '<option value="">Todas las marcas</option>' +
        ms.map(m => `<option value="${m}">${m}</option>`).join('');

      document.getElementById('sbm').innerHTML = ms.map(m => `
        <div class="sb-item" onclick="fbm('${m.replace(/'/g, "\\'")}', this)">
          <div class="sb-dot" style="background:${mc(m)}"></div>${m}
        </div>
      `).join('');
    }

    function fbm(m, el) {
      document.getElementById('fm').value = m;
      document.querySelectorAll('.sb-item').forEach(i => i.classList.remove('on'));
      el.classList.add('on');
      kpi = null;
      render();
    }

    function nav(el, mode) {
      document.querySelectorAll('.sb-item').forEach(i => i.classList.remove('on'));
      el.classList.add('on');
      kpi = mode === 'all' ? null : mode;
      document.getElementById('fs').value = '';
      document.getElementById('fm').value = '';
      render();
    }

    function gf() {
      const q = document.getElementById('srch').value.toLowerCase();
      const fm = document.getElementById('fm').value;
      const fs = document.getElementById('fs').value;

      return prj.filter(p => {
        if (q && !p.nombre.toLowerCase().includes(q) && !p.marca.toLowerCase().includes(q)) return false;
        if (fm && p.marca !== fm) return false;
        if (fs && p.estado !== fs) return false;
        if (kpi === 'activos' && p.avance >= 100) return false;
        if (kpi === 'completados' && p.avance < 100) return false;
        if (kpi === 'riesgo' && p.estado !== 'amarillo' && p.estado !== 'rojo') return false;
        return true;
      });
    }

    async function sync() {
      ss('Sincronizando...', '#6c63ff');

      if (tok) {
        try {
          const r = await fetch('https://graph.microsoft.com/v1.0/me/planner/tasks', {
            headers: { Authorization: 'Bearer ' + tok }
          });

          if (!r.ok) throw new Error(r.status);

          const d = await r.json();

          if (d.value && d.value.length) {
            prj = d.value.slice(0, 40).map((t, i) => ({
              id: t.id || i,
              nombre: t.title || 'Sin título',
              marca: 'Plan ' + (t.planId || '').slice(0, 6),
              tipo: 'Tarea',
              inicio: t.createdDateTime ? t.createdDateTime.slice(0, 10) : '—',
              entrega: t.dueDateTime ? t.dueDateTime.slice(0, 10) : '—',
              avance: t.percentComplete || 0,
              estado: t.percentComplete >= 100 ? 'verde' : t.percentComplete > 0 ? 'amarillo' : 'gris',
              involucrados: Object.keys(t.assignments || {}).slice(0, 4).map((_, j) => `M${j + 1}`),
              notas: ''
            }));

            ss(`Sincronizado · ${prj.length} tareas`, '#43e97b');
          } else {
            prj = SP.map(p => ({ ...p }));
            ss('Planner vacío · ejemplo', '#f7971e');
          }
        } catch (e) {
          prj = SP.map(p => ({ ...p }));
          ss('Error · datos de ejemplo', '#ff6584');
        }
      } else {
        prj = SP.map(p => ({ ...p }));
        ss(`Vista previa · ${prj.length} proyectos`, '#8892b0');
      }

      pf();
      render();
    }

    function rKPI() {
      const tot = prj.length;
      const comp = prj.filter(p => p.avance >= 100).length;
      const act = tot - comp;
      const risk = prj.filter(p => p.estado === 'amarillo' || p.estado === 'rojo').length;
      const avg = tot ? Math.round(prj.reduce((a, p) => a + p.avance, 0) / tot) : 0;

      const ks = [
        { k: 'activos', c: 'cp', l: 'Proyectos activos', v: act, s: `de ${tot} en total`, p: Math.round((act / Math.max(tot, 1)) * 100), f: 'var(--ac)' },
        { k: 'completados', c: 'cg', l: 'Completados', v: comp, s: `${Math.round((comp / Math.max(tot, 1)) * 100)}% del total`, p: Math.round((comp / Math.max(tot, 1)) * 100), f: 'var(--ac3)' },
        { k: 'riesgo', c: 'cy', l: 'En riesgo', v: risk, s: 'Requieren atención', p: Math.round((risk / Math.max(tot, 1)) * 100), f: 'var(--ac4)' },
        { k: null, c: 'cr', l: 'Avance promedio', v: `${avg}%`, s: 'Todos los proyectos', p: avg, f: 'var(--ac2)' }
      ];

      document.getElementById('kg').innerHTML = ks.map(k => `
        <div class="kcard ${k.c}${kpi === k.k ? ' on' : ''}" onclick="tk(${k.k ? `'${k.k}'` : 'null'})">
          <div class="klb">${k.l}</div>
          <div class="kv">${k.v}</div>
          <div class="ksub">${k.s}</div>
          <div class="kbar">
            <div class="kfill" style="width:${k.p}%;background:${k.f}"></div>
          </div>
        </div>
      `).join('');
    }

    function tk(k) {
      kpi = kpi === k ? null : k;
      render();
    }

    function sw(v) {
      view = v;
      document.getElementById('vt').style.display = v === 't' ? '' : 'none';
      document.getElementById('vk').style.display = v === 'k' ? '' : 'none';
      document.getElementById('bt').classList.toggle('on', v === 't');
      document.getElementById('bk').classList.toggle('on', v === 'k');
      render();
    }

    function avs(arr) {
      return `
        <div class="avs">
          ${arr.slice(0, 4).map((n, i) => `
            <div class="av" style="background:${AC[i % AC.length]}30;color:${AC[i % AC.length]}">
              ${ini(n)}
            </div>
          `).join('')}
          ${arr.length > 4 ? `<div class="av" style="background:rgba(255,255,255,.08);color:var(--t2)">+${arr.length - 4}</div>` : ''}
        </div>
      `;
    }

    function st(e) {
      const s = ST[e] || ST.gris;
      return `
        <span class="sema" style="background:${s.bg};color:${s.c}">
          <span style="width:7px;height:7px;border-radius:50%;background:${s.d};display:inline-block"></span>
          ${s.l}
        </span>
      `;
    }

    function pb(n) {
      const c = n >= 100 ? ST.verde : n > 0 ? ST.amarillo : ST.gris;
      return `
        <div class="pc">
          <div class="pb">
            <div class="pf" style="width:${n}%;background:${c.d}"></div>
          </div>
          <span class="pt" style="color:${c.c}">${n}%</span>
        </div>
      `;
    }

    function render() {
      const data = gf();
      rKPI();
      document.getElementById('sub').textContent = `${data.length} proyecto${data.length !== 1 ? 's' : ''}`;

      if (view === 't') {
        rT(data);
      } else {
        rK(data);
      }
    }

    function rT(data) {
      const g = {};
      data.forEach(p => {
        if (!g[p.marca]) g[p.marca] = [];
        g[p.marca].push(p);
      });

      if (!Object.keys(g).length) {
        document.getElementById('vt').innerHTML = '<div class="empty">Sin proyectos con estos filtros</div>';
        return;
      }

      document.getElementById('vt').innerHTML = `
        <div class="twrap">
          <div class="thead">
            <div class="th">Proyecto</div>
            <div class="th">Tipo</div>
            <div class="th">Involucrados</div>
            <div class="th">Marca</div>
            <div class="th">Inicio</div>
            <div class="th">Entrega</div>
            <div class="th">Avance</div>
            <div class="th">Estado</div>
            <div class="th"></div>
          </div>

          ${Object.entries(g).map(([m, rows]) => `
            <div class="glb">
              <div class="gdot" style="background:${mc(m)}"></div>
              ${m}
              <span style="color:var(--t2);font-weight:400;margin-left:4px">— ${rows.length} proyecto${rows.length !== 1 ? 's' : ''}</span>
            </div>

            ${rows.map((p, i) => `
              <div class="tr" style="animation-delay:${i * 25}ms" onclick="openM(${JSON.stringify(p.id)})">
                <div><div class="rn">${p.nombre}</div></div>
                <div><span style="font-size:11px;color:var(--t2)">${p.tipo}</span></div>
                <div>${avs(p.involucrados)}</div>
                <div><span class="mpill" style="background:${mc(p.marca)}20;color:${mc(p.marca)}">${p.marca}</span></div>
                <div class="dc">${p.inicio}</div>
                <div class="dc" style="color:${p.estado === 'rojo' ? ST.rojo.c : 'var(--t2)'}">${p.entrega}</div>
                <div>${pb(p.avance)}</div>
                <div>${st(p.estado)}</div>
                <div>
                  <button class="mb" onclick="event.stopPropagation();openM(${JSON.stringify(p.id)})">···</button>
                </div>
              </div>
            `).join('')}
          `).join('')}
        </div>
      `;
    }

    function rK(data) {
      const cols = [
        { k: 'gris', l: 'Sin iniciar' },
        { k: 'amarillo', l: 'En progreso' },
        { k: 'rojo', l: 'Retrasado' },
        { k: 'verde', l: 'Completado' }
      ];

      document.getElementById('vk').innerHTML = `
        <div class="kan">
          ${cols.map(col => {
            const its = data.filter(p => p.estado === col.k);
            const s = ST[col.k];

            return `
              <div class="kcol" style="border-top:3px solid ${s.d}">
                <div class="khdr">
                  <div class="ktit">
                    <span style="width:7px;height:7px;border-radius:50%;background:${s.d};display:inline-block"></span>
                    ${s.l}
                  </div>
                  <span class="kbadge">${its.length}</span>
                </div>

                ${its.length === 0 ? '<div style="text-align:center;padding:2rem;color:var(--t2);font-size:12px;opacity:.4">Sin proyectos</div>' : ''}

                ${its.map((p, i) => `
                  <div class="kcard2" style="animation-delay:${i * 35}ms" onclick="openM(${JSON.stringify(p.id)})">
                    <div class="kname">${p.nombre}</div>
                    <div class="kmeta">
                      <span class="mpill" style="background:${mc(p.marca)}20;color:${mc(p.marca)}">${p.marca}</span>
                      <span style="font-size:10px;color:var(--t2)">${p.tipo}</span>
                    </div>
                    ${pb(p.avance)}
                    <div class="kft">
                      ${avs(p.involucrados)}
                      <div class="kdate">${p.entrega}</div>
                    </div>
                  </div>
                `).join('')}
              </div>
            `;
          }).join('')}
        </div>
      `;
    }

    function openM(id) {
      const p = prj.find(x => String(x.id) === String(id));
      if (!p) return;

      document.getElementById('mr').innerHTML = `
        <div class="ov" onclick="closeM(event)">
          <div class="mod">
            <div class="mtop">
              <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:14px">
                <div style="flex:1;min-width:0">
                  <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap">
                    <span class="mpill" style="background:${mc(p.marca)}20;color:${mc(p.marca)}">${p.marca}</span>
                    <span style="font-size:11px;color:var(--t2);background:rgba(255,255,255,.06);padding:3px 8px;border-radius:20px">${p.tipo}</span>
                  </div>
                  <div style="font-size:19px;font-weight:700;color:var(--t3)">${p.nombre}</div>
                </div>
                <button class="cx" onclick="closeM()">×</button>
              </div>

              <div style="display:flex;align-items:center;gap:12px;margin-top:14px;flex-wrap:wrap">
                ${st(p.estado)}
                ${pb(p.avance)}
              </div>
            </div>

            <div class="mbody">
              <div class="ms">
                <div class="mlb">Fechas</div>
                <div class="mgrid">
                  <div class="mf">
                    <div class="mfl">Inicio</div>
                    <div class="mfv">${p.inicio}</div>
                  </div>
                  <div class="mf">
                    <div class="mfl">Entrega</div>
                    <div class="mfv" style="color:${p.estado === 'rojo' ? ST.rojo.c : 'var(--t3)'}">${p.entrega}</div>
                  </div>
                </div>
              </div>

              <div class="ms">
                <div class="mlb">Involucrados (${p.involucrados.length})</div>
                <div class="mavs">
                  ${p.involucrados.map((n, i) => `
                    <div class="mavchip">
                      <div class="mavdot" style="background:${AC[i % AC.length]}30;color:${AC[i % AC.length]}">${ini(n)}</div>
                      <span style="font-size:12px;color:var(--t3)">${n}</span>
                    </div>
                  `).join('')}
                </div>
              </div>

              <div class="ms">
                <div class="mlb">Notas</div>
                <div class="mnotes">${p.notas || 'Sin notas disponibles.'}</div>
              </div>
            </div>

            <div class="mfoot">
              <button class="tbtn" onclick="closeM()">Cerrar</button>
            </div>
          </div>
        </div>
      `;
    }

    function closeM(e) {
      if (!e || e.target.classList.contains('ov')) {
        document.getElementById('mr').innerHTML = '';
      }
    }

    (async function init() {
      const p = new URLSearchParams(location.search);
      const code = p.get('code');
      const err = p.get('error');

      if (err) {
        ss(`Error de login: ${err}`, '#ff6584');
      }

      if (code) {
        history.replaceState(null, '', location.pathname);
        ss('Autenticando...', '#6c63ff');
        tok = await xcode(code);

        if (tok) {
          const btn = document.getElementById('ms-btn');
          btn.innerHTML = `
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#43e97b" stroke-width="2.5">
              <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
            Conectado
          `;
          btn.style.background = 'rgba(67,233,123,.12)';
          btn.style.color = '#43e97b';
          btn.style.borderColor = 'rgba(67,233,123,.3)';
        }
      }

      await sync();
    })();
  </script>
</body>
</html>
